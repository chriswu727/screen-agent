<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Agent 测试页面</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 40px; }
    h1 { margin-bottom: 24px; color: #333; }
    .test-section { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .test-section h2 { margin-bottom: 16px; color: #555; }

    /* 按钮测试 */
    .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin: 4px; }
    .btn-primary { background: #007AFF; color: white; }
    .btn-danger { background: #FF3B30; color: white; }
    .btn-success { background: #34C759; color: white; }

    /* 输入框测试 */
    input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; margin-bottom: 10px; }
    textarea { height: 80px; resize: vertical; }

    /* 计数器 */
    .counter { display: flex; align-items: center; gap: 16px; }
    .counter .value { font-size: 48px; font-weight: bold; color: #007AFF; min-width: 80px; text-align: center; }
    .counter .btn { font-size: 24px; width: 50px; height: 50px; border-radius: 50%; }

    /* 待办列表 */
    .todo-input { display: flex; gap: 8px; margin-bottom: 12px; }
    .todo-input input { flex: 1; }
    .todo-list { list-style: none; }
    .todo-list li { padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 8px; }
    .todo-list li.done { text-decoration: line-through; color: #999; }
    .todo-list li input[type="checkbox"] { width: 20px; height: 20px; }

    /* 状态显示 */
    #status { margin-top: 16px; padding: 12px; background: #f0f0f0; border-radius: 6px; font-family: monospace; min-height: 40px; }

    /* 下拉菜单 */
    select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; width: 200px; }
  </style>
</head>
<body>
  <h1>Screen Agent 测试页面</h1>

  <!-- 按钮测试区 -->
  <div class="test-section">
    <h2>1. 按钮点击测试</h2>
    <button class="btn btn-primary" onclick="log('点击了蓝色按钮')">蓝色按钮</button>
    <button class="btn btn-danger" onclick="log('点击了红色按钮')">红色按钮</button>
    <button class="btn btn-success" onclick="log('点击了绿色按钮')">绿色按钮</button>
  </div>

  <!-- 计数器 -->
  <div class="test-section">
    <h2>2. 计数器</h2>
    <div class="counter">
      <button class="btn btn-danger" onclick="changeCount(-1)">−</button>
      <span class="value" id="count">0</span>
      <button class="btn btn-success" onclick="changeCount(1)">+</button>
    </div>
  </div>

  <!-- 输入框测试 -->
  <div class="test-section">
    <h2>3. 文本输入测试</h2>
    <input type="text" id="textInput" placeholder="在这里输入文字..." oninput="log('输入: ' + this.value)">
    <textarea id="textArea" placeholder="多行文本输入..."></textarea>
  </div>

  <!-- 待办列表 -->
  <div class="test-section">
    <h2>4. 待办事项</h2>
    <div class="todo-input">
      <input type="text" id="todoInput" placeholder="添加新事项...">
      <button class="btn btn-primary" onclick="addTodo()">添加</button>
    </div>
    <ul class="todo-list" id="todoList"></ul>
  </div>

  <!-- 下拉菜单 -->
  <div class="test-section">
    <h2>5. 下拉菜单</h2>
    <select id="colorSelect" onchange="log('选择了: ' + this.value)">
      <option value="">请选择颜色</option>
      <option value="红色">红色</option>
      <option value="蓝色">蓝色</option>
      <option value="绿色">绿色</option>
      <option value="黄色">黄色</option>
    </select>
  </div>

  <!-- 操作日志 -->
  <div class="test-section">
    <h2>操作日志</h2>
    <div id="status">等待操作...</div>
  </div>

  <script>
    let count = 0;

    function log(msg) {
      const status = document.getElementById('status');
      const time = new Date().toLocaleTimeString();
      status.innerHTML = `[${time}] ${msg}<br>` + status.innerHTML;
    }

    function changeCount(delta) {
      count += delta;
      document.getElementById('count').textContent = count;
      log(`计数器: ${count}`);
    }

    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;

      const li = document.createElement('li');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.onchange = function() {
        li.classList.toggle('done', this.checked);
        log(this.checked ? `完成: ${text}` : `取消完成: ${text}`);
      };
      const span = document.createElement('span');
      span.textContent = text;
      li.appendChild(cb);
      li.appendChild(span);
      document.getElementById('todoList').appendChild(li);

      log(`添加待办: ${text}`);
      input.value = '';
    }

    document.getElementById('todoInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addTodo();
    });

    log('页面已加载');
  </script>
</body>
</html>
